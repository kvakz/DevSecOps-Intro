apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: juice-shop
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      serviceAccountName: juice-shop-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-shop
          image: bkimminich/juice-shop@sha256:fd58bdc9745416afce8184ee0666278a436574633ea7880365153a63bfd418b0
          command:
            - /nodejs/bin/node
            - -e
            - |
              const fs = require("fs");
              function cp(src, dest) {
                fs.mkdirSync(dest, { recursive: true });
                for (const e of fs.readdirSync(src)) {
                  const s = src + "/" + e;
                  const d = dest + "/" + e;
                  const st = fs.statSync(s);
                  if (st.isDirectory()) {
                    if (e !== "node_modules") cp(s, d);
                  } else {
                    fs.copyFileSync(s, d);
                  }
                }
              }
              cp("/juice-shop", "/shared/juice-shop");
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: shop
              mountPath: /shared
        - name: restore-modules
          image: bkimminich/juice-shop@sha256:fd58bdc9745416afce8184ee0666278a436574633ea7880365153a63bfd418b0
          command:
            - /nodejs/bin/node
            - -e
            - |
              const fs = require("fs");
              function cp(src, dest) {
                fs.mkdirSync(dest, { recursive: true });
                for (const e of fs.readdirSync(src)) {
                  const s = src + "/" + e;
                  const d = dest + "/" + e;
                  if (fs.statSync(s).isDirectory()) {
                    cp(s, d);
                  } else {
                    fs.copyFileSync(s, d);
                  }
                }
              }
              cp("/juice-shop/node_modules", "/modules/node_modules");
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: modules
              mountPath: /modules
      containers:
        - name: juice-shop
          image: bkimminich/juice-shop@sha256:fd58bdc9745416afce8184ee0666278a436574633ea7880365153a63bfd418b0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: shop
              mountPath: /juice-shop
              subPath: juice-shop
            - name: modules
              mountPath: /juice-shop/node_modules
              subPath: node_modules
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: shop
          emptyDir: {}
        - name: modules
          emptyDir: {}
        - name: tmp
          emptyDir: {}
